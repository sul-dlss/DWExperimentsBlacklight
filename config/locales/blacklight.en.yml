en:
  blacklight:
    application_name: "DataWorks"
    search:
      start_over: "Clear all"
      show:
        back_to_search: "Search results"
        # Drop the trailing colon Blacklight appends to show-page field labels
        # (default is "%{label}:").
        label: "%{label}"
      fields:
        facet:
          access_ssi: "Access"
          funders_ssim: "Funder"
          language_ssi: "Language"
          formats_ssim: "Format"
          publication_year_isi: "Publication year"
          publisher_ssi: "Available at"
          provider_ssi: "Provider"
          stanford_contributor_bsi: "Stanford-authored only"
          subjects_ssim: "Subject"
          temporal_isim: "Temporal Coverage"
          contributors_ssim: "Contributor"
        search:
          author: Contributor
          doi: DOI
      facets:
        title: "Filters"
        mobile_button: "Filters"
        more_html: Browse all <span class="visually-hidden">%{field_name}</span> »
        suggest:
          label: "Search %{field_label}"
          placeholder: "Search %{field_label}"
        sort:
          # Menu item labels (note capitalization differs from the button).
          index: "A-Z"
          count: "Number of matches"
          # Dropdown button: "Sort by " + the current selection (lowercase).
          label: "Sort by %{selection}"
          button:
            index: "A-Z"
            count: "number of matches"
      documents:
        aria:
          limit_search: "Filter your results"
      search_bar_button: "Search"
